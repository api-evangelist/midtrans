    - POST   https://api.midtrans.com/v2/charge
    - GET    https://api.midtrans.com/v2/token
    - GET    https://api.midtrans.com/v2/card/register
    - GET    https://api.midtrans.com/v2/{order_id}/status
    - POST   https://api.midtrans.com/v2/{order_id}/approve
    - POST   https://api.midtrans.com/v2/{order_id}/deny
    - POST   https://api.midtrans.com/v2/{order_id}/cancel
    - POST   https://api.midtrans.com/v2/{order_id}/expire
    - POST   https://api.midtrans.com/v2/{order_id}/refund
    - POST   https://api.midtrans.com/v2/{order_id}/refund/online/direct
    - POST   https://api.midtrans.com/v2/pay/account
    - GET    https://api.midtrans.com/v2/pay/account/{account_id}
    - POST   https://api.midtrans.com/v1/payment-links
    - GET    https://api.midtrans.com/v1/payment-links/{order_id}
    - DELETE https://api.midtrans.com/v1/payment-links/{order_id}
    - POST   https://api.midtrans.com/v1/subscriptions
    - GET    https://api.midtrans.com/v1/subscriptions/{subscription_id}
    - PATCH  https://api.midtrans.com/v1/subscriptions/{subscription_id}
    - POST   https://api.midtrans.com/v1/subscriptions/{subscription_id}/enable
    - POST   https://api.midtrans.com/v1/subscriptions/{subscription_id}/disable
    - POST   https://api.midtrans.com/v1/subscriptions/{subscription_id}/cancel
    - GET    https://app.midtrans.com/iris/api/v1/ping
    - GET    https://app.midtrans.com/iris/api/v1/beneficiaries
    - POST   https://app.midtrans.com/iris/api/v1/beneficiaries
    - PATCH  https://app.midtrans.com/iris/api/v1/beneficiaries/{alias_name}
    - POST   https://app.midtrans.com/iris/api/v1/payouts
    - POST   https://app.midtrans.com/iris/api/v1/payouts/approve
    - POST   https://app.midtrans.com/iris/api/v1/payouts/reject
    - GET    https://app.midtrans.com/iris/api/v1/payouts/{reference_no}
    - GET    https://app.midtrans.com/iris/api/v1/balance
    - GET    https://app.midtrans.com/iris/api/v1/bank_accounts
    - GET    https://app.midtrans.com/iris/api/v1/account_validation
  endpointsModeled:
    - note: >-
        Snap, Core API charge, transaction lifecycle (status/approve/deny/cancel/
        expire/refund/direct refund), card token, card register, and GoPay
        pay-account endpoints are confirmed against Midtrans' official Postman
        collection (github.com/Midtrans/Midtrans-Payment-API-Postman-Collections)
        and the docs.midtrans.com reference. Payment Link create, Subscription
        create/get, and Iris payouts/beneficiaries/balance are confirmed in the
        docs. The Payment Link get/delete, Subscription update/enable/disable/
        cancel, Iris beneficiary update, payout reject, bank_accounts, and
        account_validation paths follow Midtrans' documented REST conventions and
        client libraries but were not each individually re-fetched; request and
        response bodies throughout the OpenAPI are modeled representatively rather
        than field-exhaustively.
  authentication: |
    HTTP Basic. Server Key is the username, password is empty:
    Authorization: Basic base64(SERVER_KEY:). The two card tokenization
    endpoints (GET /v2/token, GET /v2/card/register) use the public Client Key
    as a query parameter instead. Iris disbursement uses its own creator /
    approver API key over HTTP Basic. Sandbox keys are prefixed SB-Mid-.
