actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Midtrans' public API. Every product
    is request/response REST over HTTPS, and the only asynchronous channel is an
    HTTP notification webhook POSTed to the merchant. No AsyncAPI document was
    created because there is no server-push WebSocket or SSE transport on
    Midtrans' own API to model. WebSocket precision is therefore false.
