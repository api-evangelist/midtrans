description: >-
  FinOps view of Midtrans spend. Midtrans has no platform, setup, or monthly API
  fee - cost is incurred per successful transaction, priced by payment method
  (a percentage, a flat IDR amount, or both) and, for Iris, per payout. Because
  the fee is a merchant-discount-rate cut of payment volume rather than metered
  API usage, cost is driven by transaction mix (which methods customers choose)
  and gross payment value, not by call counts. Value-Added Tax applies to most
  methods (QRIS, GoPay, and ShopeePay are quoted VAT-inclusive).
notes: >-
  Per-unit rates here are indicative published list rates and are not reconciled;
  production rates are account-specific and negotiable at volume. Sandbox usage is
  free. The dominant cost lever is payment-method mix - steering customers toward
  lower-fee rails (QRIS, virtual account) versus cards materially changes blended
  cost of acceptance.
