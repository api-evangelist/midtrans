meters:
- name: card_transaction_fee
  description: Per-transaction fee on card payments, approx 2.9% + IDR 2,000 (excl. VAT).
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - payment_type
  - currency
- name: ewallet_transaction_fee
  description: Percentage fee on GoPay/ShopeePay (approx 2%) and QRIS (approx 0.7%), VAT-inclusive.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - payment_type
- name: bank_transfer_fee
  description: Flat per-transaction fee on virtual account / bank transfer, approx IDR 4,000 (excl. VAT).
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - bank
- name: disbursement_fee
  description: Flat per-payout fee for Iris disbursements to banks and e-wallets.
  unit: payout
  aggregation: sum
  dimensions:
  - account
  - beneficiary_bank
- name: tax_vat
  description: Value-Added Tax applied on top of applicable transaction fees.
  unit: currency
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track fees by payment_type and bank so blended cost of acceptance is visible per rail and per order.
- name: Allocation
  description: Tag transactions by product/channel via order_id conventions and custom_field so payment fees map to internal cost centers.
- name: Optimization
  description: Steer customers toward lower-fee rails (QRIS, virtual account) where suitable; batch and right-size Iris payouts; avoid duplicate charges through order_id idempotency.
- name: Accountability
  description: Reconcile settlement reports against the notification webhook monthly; review fee mix and VAT against payment volume and margin targets.
