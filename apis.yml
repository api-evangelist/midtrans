aid: midtrans
url: https://raw.githubusercontent.com/api-evangelist/midtrans/refs/heads/main/apis.yml
name: Midtrans
kind: company
description: Midtrans is an Indonesian payment gateway (part of the GoTo Group,
  alongside Gojek) that lets businesses accept online payments across cards, bank
  transfer / virtual accounts, e-wallets (GoPay, ShopeePay, QRIS), over-the-counter
  outlets, and cardless credit. It exposes Snap - a hosted / drop-in checkout - and
  a Core API for building custom checkout flows (charge, status, cancel, expire,
  refund, and card / GoPay tokenization), plus Payment Link, recurring Subscriptions,
  and Iris for disbursements / payouts. All APIs are REST over HTTPS with separate
  production (api.midtrans.com) and sandbox environments, authenticated with a Server
  Key over HTTP Basic (key as username, empty password); a public Client Key is used
  for browser-side card tokenization.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Payments
- Payment Gateway
- Indonesia
- Southeast Asia
- Snap
- E-Wallet
- Virtual Account
- Cards
- Bank Transfer
- Fintech
